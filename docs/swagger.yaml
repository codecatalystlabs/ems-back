basePath: /api/v1
definitions:
  dispatch_internal_modules_users_application_dto.CreateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
      phone:
        type: string
      username:
        type: string
    required:
    - first_name
    - last_name
    - password
    - username
    type: object
info:
  contact: {}
  description: Go modular monolith backend for emergency alert intake, ambulance dispatch,
    user management, and fleet readiness.
  title: Dispatch Backend API
  version: "1.0"
paths:
  /users:
    get:
      description: Returns paginated users with search, sorting, and filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search term
        in: query
        name: search
        type: string
      - description: Sort field
        enum:
        - created_at
        - username
        - first_name
        - last_name
        - status
        in: query
        name: sort_by
        type: string
      - description: Sort order
        enum:
        - ASC
        - DESC
        in: query
        name: sort_order
        type: string
      - description: Filter by status
        in: query
        name: filter[status]
        type: string
      - description: Filter by active flag
        in: query
        name: filter[is_active]
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Creates a new system user
      parameters:
      - description: Create user payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dispatch_internal_modules_users_application_dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Create user
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
