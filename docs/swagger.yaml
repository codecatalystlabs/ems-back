info:
  contact: {}
  description: Go modular monolith backend for emergency alert intake, ambulance dispatch,
    user management, and fleet readiness.
  title: Dispatch Backend API
  version: "1.0"
paths:
  /ambulances:
    get:
      description: Returns paginated ambulances with status and readiness
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search term (code, plate, VIN, make, model)
        in: query
        name: search
        type: string
      - description: Sort field
        enum:
        - created_at
        - plate_number
        - status
        - dispatch_readiness
        in: query
        name: sort_by
        type: string
      - description: Sort order
        enum:
        - ASC
        - DESC
        in: query
        name: sort_order
        type: string
      - description: Filter by status
        in: query
        name: filter[status]
        type: string
      - description: Filter by dispatch readiness
        in: query
        name: filter[dispatch_readiness]
        type: string
      - description: Filter by district id
        in: query
        name: filter[district_id]
        type: string
      - description: Filter by ambulance category id
        in: query
        name: filter[category_id]
        type: string
      - description: Filter by created_at from (ISO 8601)
        in: query
        name: filter[date_from]
        type: string
      - description: Filter by created_at to (ISO 8601)
        in: query
        name: filter[date_to]
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List ambulances
      tags:
      - Fleet
    post:
      consumes:
      - application/json
      description: Create a new ambulance record
      parameters:
      - description: Create ambulance payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dispatch_internal_modules_fleet_application.CreateAmbulanceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create ambulance
      tags:
      - Fleet
  /ambulances/{id}:
    delete:
      description: Delete an ambulance by ID
      parameters:
      - description: Ambulance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete ambulance
      tags:
      - Fleet
    get:
      description: Get a single ambulance by ID
      parameters:
      - description: Ambulance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get ambulance
      tags:
      - Fleet
    put:
      consumes:
      - application/json
      description: Update an existing ambulance
      parameters:
      - description: Ambulance ID
        in: path
        name: id
        required: true
        type: string
      - description: Update ambulance payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dispatch_internal_modules_fleet_application.UpdateAmbulanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update ambulance
      tags:
      - Fleet
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dispatch_internal_modules_auth_application_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dispatch_internal_modules_auth_application_dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes current session or all sessions
      parameters:
      - description: Logout payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dispatch_internal_modules_auth_application_dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refreshes the access token using the refresh token
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dispatch_internal_modules_auth_application_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dispatch_internal_modules_auth_application_dto.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Refresh tokens
      tags:
      - Auth
  /auth/sessions:
    get:
      description: Lists active user sessions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List sessions
      tags:
      - Auth
  /blood/offers:
    post:
      consumes:
      - application/json
      description: Creates a new blood offer for a requisition
      parameters:
      - description: Offer details
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dispatch_internal_modules_blood_application_dto.CreateBloodOfferRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create blood offer
      tags:
      - Blood
  /blood/requisitions:
    get:
      description: Returns paginated blood requisitions with search, sorting, and
        filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Search term
        in: query
        name: search
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by blood type
        in: query
        name: blood_type
        type: string
      - description: Filter by urgency level
        in: query
        name: urgency_level
        type: string
      - description: Filter by created_at from (ISO 8601)
        in: query
        name: filter[date_from]
        type: string
      - description: Filter by created_at to (ISO 8601)
        in: query
        name: filter[date_to]
        type: string
      - description: 'Sort by field: created_at, status, urgency_level'
        in: query
        name: sort_by
        type: string
      - description: 'Sort order: asc or desc'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
