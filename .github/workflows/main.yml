name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: joshmyles/ems-back

jobs:
  # Go build and vet (runs on all pushes and PRs)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

  # Build, Push Docker Image and Deploy (only on push to main)
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            # Stop and remove existing container
            docker stop ems-back || true
            docker rm ems-back || true

            # Pull the latest image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Run the new container (Go app listens on 8080)
            # Configure DB_HOST, REDIS_ADDR, KAFKA_BROKERS, JWT_SECRET via secrets or server .env
            docker run -d \
              --name ems-back \
              --restart unless-stopped \
              -p 3002:8080 \
              -e APP_ENV=production \
              -e APP_PORT=8080 \
              ${{ env.IMAGE_NAME }}:latest

            # Clean up unused images
            docker image prune -f

            echo "Deployment completed successfully!"
            echo "Application is running on port 3002"