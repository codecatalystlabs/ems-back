  app:
    image: joshmyles/ems-back:latest
    container_name: ems-back
    ports:
      - '3005:8080'
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ems_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ems_pgdata: