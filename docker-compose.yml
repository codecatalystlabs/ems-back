services:
  postgres:
    image: postgres:17.6
    container_name: ems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ems_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5431:5432'
    volumes:
      - ems_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ems_db"]
      interval: 10s
      timeout: 5s
      retries: 10

